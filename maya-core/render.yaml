services:
  - type: web
    name: maya-core
    env: node
    rootDir: maya-core
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NEXT_TELEMETRY_DISABLED
        value: '1'
